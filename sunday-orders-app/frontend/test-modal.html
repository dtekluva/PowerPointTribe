<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="styles.css?v=2.0">

<body>

        <button onclick="testModal()" class="btn btn-primary">Test Enhanced Modal</button>

                <div class="modal-header">
                    <h3>Test Modal</h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Modal content will be inserted here -->
                </div>
            </div>
        </div>
    </div>

            effective_sales_revenue: 10800.0,
            total_giveaway_cost: 1500.0,
            total_expenses: 2500.0,
            has_sales_data: true,
            sales_completion_percentage: 11.11,
            giveaways: [
                {
                    id: 3,
                    product_name: "Sugar Donuts",
                    quantity: 3,
                    recipient: "Pastor",
                    cost_price: "500.00",
                    total_cost: 1500.0,
                    date_given: "2025-08-03",

            ],
            expenses: [
                {

        function testModal() {
            console.log('Testing enhanced modal with data:', testOrder);
            showOrderDetailModal(testOrder);
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Override the showModal function to use our test modal
        const originalShowModal = showModal;
        window.showModal = function(title, content) {
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('modal-overlay').style.display = 'flex';
        };
