<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Orders - Login</title>
    <link rel="stylesheet" href="login.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <!-- Left Half - Hearts Background -->
        <div class="hearts-section">
            <div class="hearts-background">
                <!-- Hearts will be generated by CSS -->
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
                <div class="heart-text">tribes heart</div>
            </div>
            <!-- Floating hearts -->
            <div class="floating-heart" style="top: 10%; left: 15%; animation-delay: 0s;">💚</div>
            <div class="floating-heart" style="top: 25%; left: 80%; animation-delay: 1s;">💚</div>
            <div class="floating-heart" style="top: 40%; left: 20%; animation-delay: 2s;">💚</div>
            <div class="floating-heart" style="top: 60%; left: 70%; animation-delay: 3s;">💚</div>
            <div class="floating-heart" style="top: 75%; left: 30%; animation-delay: 4s;">💚</div>
            <div class="floating-heart" style="top: 15%; left: 60%; animation-delay: 5s;">💚</div>
            <div class="floating-heart" style="top: 85%; left: 85%; animation-delay: 6s;">💚</div>
            <div class="floating-heart" style="top: 35%; left: 45%; animation-delay: 7s;">💚</div>
        </div>

        <!-- Right Half - Login Form -->
        <div class="login-section">
            <div class="login-form-container">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to your Sunday Orders account</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="username" name="username" required placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <i class="fas fa-spinner fa-spin btn-spinner" style="display: none;"></i>
                    </button>

                    <div class="error-message" id="errorMessage" style="display: none;"></div>
                </form>

                <div class="login-footer">
                    <p>&copy; 2026 Sunday Orders CRM. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js?v=1.0"></script>
</body>
</html>
